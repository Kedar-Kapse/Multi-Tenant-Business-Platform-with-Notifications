server:
  port: 8083

spring:
  application:
    name: notification-service

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      auto-startup: false
    consumer:
      group-id: notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"
    properties:
      reconnect.backoff.ms: 5000
      reconnect.backoff.max.ms: 20000

# Restore Production — Manual Nimbus JWT validation via CustomAuthenticationManager
# No issuer-uri auto-config. ValidateToken fetches JWKS from /realms/{tenant}/protocol/openid-connect/certs
keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://localhost:8080}
  admin:
    username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
    status-page-url-path: /actuator/info
    health-check-url-path: /actuator/health
    metadata-map:
      management.port: ${server.port}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,loggers,mappings"
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true
