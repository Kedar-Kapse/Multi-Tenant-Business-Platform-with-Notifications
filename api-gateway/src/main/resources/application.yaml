server:
  port: 8085

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      default-filters: []

      routes:
        # ---- ACCESS-SECURITY-SERVICE (Port 8082) ----
        - id: access-security-service
          uri: lb://access-security-service
          predicates:
            - Path=/access-security/**
          filters:
            - RewritePath=/access-security/(?<segment>.*), /${segment}

        # ---- BUSINESS-SERVICE (Port 8081) ----
        - id: business-service
          uri: lb://business-service
          predicates:
            - Path=/business/**
          filters:
            - RewritePath=/business/(?<segment>.*), /${segment}

        # ---- NOTIFICATION-SERVICE (Port 8083) ----
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/notifications/**
          filters:
            - RewritePath=/notifications/(?<segment>.*), /${segment}

        # ---- ADMIN-SERVICE (Port 8084) ----
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/admin/**
          filters:
            - RewritePath=/admin/(?<segment>.*), /${segment}

# Restore Production — Manual Nimbus JWT validation in reactive gateway
# No issuer-uri auto-config. RestoreReactiveAuthManager uses SignedJWT.parse() + RSASSAVerifier
# to manually fetch JWKS from /realms/{tenant}/protocol/openid-connect/certs.
keycloak:
  base-url: ${KEYCLOAK_BASE_URL:http://localhost:8080}

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always
